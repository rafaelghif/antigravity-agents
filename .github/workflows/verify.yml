name: Enterprise Workspace Verification

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  compliance-audit:
    name: Workspace Compliance & Structure Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Critical Configuration Files
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "::error::AGENTS.md is missing from root!"
            exit 1
          fi
          if [ ! -f ".agents/rules.md" ]; then
            echo "::error::.agents/rules.md is missing!"
            exit 1
          fi
          if [ ! -f ".agents/tasks/board.md" ]; then
            echo "::error::.agents/tasks/board.md is missing!"
            exit 1
          fi

      - name: Run Secret Scanning Guard
        run: |
          # Scanning for potential credential patterns in code
          git grep -i -E "password|secret|api_key|token" -- './*' || true

  test-suite:
    name: Test Execution Suite
    needs: compliance-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Stack Detection
        run: |
          python3 .agents/scripts/recon.py

      - name: Run Workspace Validation Scripts
        run: |
          python3 .agents/scripts/validate.py

      - name: Run Unit Tests
        run: |
          python3 -m unittest discover -s .agents/tests
