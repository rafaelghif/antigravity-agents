archived_rules:
- '- **[Learning: skills]** Dynamically scaffold and index custom playbooks using
  CLI skill tools to extend agent capabilities whenever facing domain-specific task
  gaps.'
- '- **[Learning: optimization]** Platform token limit usage parsing is optimized
  to extract from markdown tables and lists.; Token usage sync executes as a detached
  background subprocess (using Popen with `start_new_session`) to prevent blocking
  the user.'
- '- **[Learning: Testing / Mocking]** When mocking `sys.exit`, ALWAYS configure it
  to raise `SystemExit` (`side_effect=SystemExit`) and wrap in `assertRaises`. Uncontrolled
  mock exits leak and truncate real local configs.; Validation guard leverages git-diff
  driven incremental validation to skip static checks/tests on untouched code.'
- '- **[Learning: process]** CRITICAL RULE: The agent MUST ALWAYS run ''./helper.sh
  changelog'' to generate release notes and bump versions BEFORE concluding any task
  or epic. Failure to do so breaks the deployment pipeline. This is non-negotiable.'
- '- **[Learning: cross-platform]** Windows PowerShell wrappers (like install.ps1)
  must use try/finally blocks instead of bash-style traps to guarantee temporary directory
  cleanup upon early exit or failure.'
- '- **[Learning: sandbox]** Windows Sandbox Pathing: If run_command fails with "sandbox
  configuration error: readwrite /: non-absolute file path", request unsandboxed permission
  for powershell to run commands outside the sandbox container.'
- '- **[Learning: Git & Security]** Harden Git hooks, sanitize user SSH keys, and
  enforce Git source downloading for offline compatibility.; Validate GPG key imports
  and developer identity rotation rules locally to safeguard credentials.'
- '- **[Learning: compliance]** AI Skill Enforcer strictly blocks validation if required
  playbooks (e.g. `devops-release`) were not viewed when modifying related files.'
- '- **[Learning: configuration]** Replaced regex replacements with static `.template`
  files for config generation. Always sync template-to-target files (mapped in `template_map.md`)
  to prevent drift.; MCP servers are centralized in `mcp_config.json.template` (supporting
  local domains and tokens) and Git profiles in `.agents/git_profiles.json`.'
